<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEAL Hackathon - Cổng Giao Diện Hệ Thống</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <div id="login-box" class="form-box">
            <h2>SEAL Hackathon</h2>
            <p class="subtitle">Backend Login</p>
            <div class="avatar-icon">👤</div>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" name="username" required placeholder="Nhập tài khoản...">
                </div>
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" name="password" required placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn">LOG IN</button>
            </form>
            
            <div class="form-footer">
                <a href="#" id="forgot-password">Forgot Password?</a>
                <p>Don't have an account? <a href="#" id="show-register">Sign Up</a></p>
            </div>
        </div>

        <div id="register-form" class="form-box hidden">
            <h2>SEAL Hackathon</h2>
            <p class="subtitle">Create Account</p>
            <div class="avatar-icon">📝</div>
            <form id="register-form-element">
                <div class="input-group">
                    <label>Username:</label>
                    <input type="text" name="username" required placeholder="Tên tài khoản...">
                </div>
                <div class="input-group">
                    <label>Email:</label>
                    <input type="email" name="email" required placeholder="Địa chỉ email...">
                </div>
                <div class="input-group">
                    <label>Password:</label>
                    <input type="password" name="password" required placeholder="Mật khẩu bảo mật...">
                </div>
                <button type="submit" class="btn">REGISTER</button>
            </form>
            <div class="form-footer">
                <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
