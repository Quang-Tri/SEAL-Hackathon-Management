<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản Giám khảo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        nav {
            background: #1a1a2e;
            color: white;
            padding: 14px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { font-size: 18px; font-weight: 600; }
        nav .nav-links a {
            color: #ccc;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        nav .nav-links a:hover { color: white; }

        /* MAIN */
        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: #4338ca; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        /* JUDGE LIST */
        .judge-list {
            margin-top: 30px;
        }

        .judge-list h2 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f8f9fa;
            padding: 10px 12px;
            text-align: left;
            color: #666;
            font-weight: 500;
            border-bottom: 1px solid #e5e7eb;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            color: #333;
        }

        .badge {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">SEAL HMS — Admin</div>
    <div class="nav-links">
        <a href="/static/home.html">Trang chủ</a>
        <a href="#" onclick="logout()">Đăng xuất</a>
    </div>
</nav>

<div class="container">
    <h1>Tạo tài khoản Giám khảo</h1>
    <p class="subtitle">Tạo tài khoản cho giám khảo tham gia chấm điểm cuộc thi.</p>

    <div class="card">
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Nhập email">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
        </div>
        <button class="btn" onclick="createJudge()">Tạo tài khoản Giám khảo</button>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>
    </div>

    <div class="judge-list">
        <h2>Danh sách Giám khảo</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                </tr>
            </thead>
            <tbody id="judgeTableBody">
                <tr><td colspan="4" style="text-align:center;color:#999">Đang tải...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/static/login.html";

    // Tạo tài khoản Judge
    async function createJudge() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !email || !password) {
            showError("Vui lòng điền đầy đủ thông tin!");
            return;
        }

        try {
            const res = await fetch("/admin/create-judge", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess(`Tạo thành công! Tài khoản: ${data.username}`);
                document.getElementById("username").value = "";
                document.getElementById("email").value = "";
                document.getElementById("password").value = "";
                loadJudges();
            } else {
                showError(data.detail || "Tạo tài khoản thất bại!");
            }
        } catch (err) {
            showError("Lỗi kết nối server!");
        }
    }

    // Load danh sách Judge
    async function loadJudges() {
        try {
            const res = await fetch("/admin/judges", {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            const tbody = document.getElementById("judgeTableBody");

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999">Chưa có giám khảo nào</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(j => `
                <tr>
                    <td>${j.user_id}</td>
                    <td>${j.username}</td>
                    <td>${j.email}</td>
                    <td><span class="badge">${j.role}</span></td>
                </tr>
            `).join("");
        } catch (err) {
            console.error("Lỗi tải danh sách judge:", err);
        }
    }

    function showSuccess(msg) {
        const el = document.getElementById("successAlert");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("errorAlert").style.display = "none";
    }

    function showError(msg) {
        const el = document.getElementById("errorAlert");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("successAlert").style.display = "none";
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/static/login.html";
    }

    loadJudges();
</script>
</body>
</html>
